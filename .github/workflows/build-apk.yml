name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 11076708

      - name: Accept Android SDK Licenses
        run: yes | sdkmanager --licenses || true

      - name: Install Android Build Tools
        run: sdkmanager "build-tools;34.0.0" "platforms;android-34"

      - name: Install npm dependencies
        run: npm install

      - name: Sync Capacitor to Android
        run: npx cap sync android

      - name: Grant Gradle permissions
        run: chmod +x android/gradlew

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: mv android/app/build/outputs/apk/debug/app-debug.apk android/app/build/outputs/apk/debug/G-Village.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: G-Village-APK
          path: android/app/build/outputs/apk/debug/G-Village.apk
          retention-days: 30
