<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --g900:#0D3B0F;--g800:#1B5E20;--g700:#2E7D32;--g600:#388E3C;
  --g500:#43A047;--g400:#66BB6A;--g300:#81C784;--g200:#A5D6A7;
  --g100:#C8E6C9;--g50:#E8F5E9;--g25:#F1F8F2;
  --b700:#1565C0;--b500:#2196F3;--b100:#BBDEFB;--b50:#E3F2FD;
  --n900:#0F172A;--n800:#1E293B;--n700:#334155;--n600:#475569;
  --n500:#64748B;--n400:#94A3B8;--n300:#CBD5E1;--n200:#E2E8F0;
  --n100:#F1F5F9;--n50:#F8FAFC;--white:#FFF;
  --amber:#F59E0B;--red:#EF4444;
  --r-sm:8px;--r-md:12px;--r-lg:16px;--r-xl:20px;--r-2xl:24px;--r-full:9999px;
  --s-xs:0 1px 2px rgba(0,0,0,.04);
  --s-sm:0 1px 3px rgba(0,0,0,.07),0 1px 2px rgba(0,0,0,.04);
  --s-md:0 4px 6px -1px rgba(0,0,0,.07),0 2px 4px -2px rgba(0,0,0,.04);
  --s-lg:0 10px 15px -3px rgba(0,0,0,.08),0 4px 6px -4px rgba(0,0,0,.03);
  --s-xl:0 20px 25px -5px rgba(0,0,0,.08),0 8px 10px -6px rgba(0,0,0,.03);
  --nav-h:64px;--safe-b:env(safe-area-inset-bottom,0px)
}
html{font-family:'Plus Jakarta Sans',system-ui,-apple-system,sans-serif;-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent;font-size:15px}
body{background:#F0F2F5;color:var(--n900);overflow:hidden;height:100dvh;width:100vw}
a{text-decoration:none;color:inherit}
*::-webkit-scrollbar{display:none}
*{scrollbar-width:none;-ms-overflow-style:none}
#shell{max-width:430px;margin:0 auto;height:100dvh;position:relative;overflow:hidden;background:var(--n50);box-shadow:0 0 60px rgba(0,0,0,.08)}
#viewport{position:absolute;inset:0;bottom:calc(var(--nav-h) + var(--safe-b));overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;overscroll-behavior-y:contain}
#viewport.full{bottom:0}
#viewport::-webkit-scrollbar{display:none}
.pg{position:relative;min-height:100%;will-change:transform,opacity}
.pg.slide-in{animation:slideIn .38s cubic-bezier(.16,1,.3,1) forwards}
.pg.fade-in{animation:fadeIn .3s cubic-bezier(.16,1,.3,1) forwards}
@keyframes slideIn{0%{transform:translateX(40%);opacity:0}100%{transform:translateX(0);opacity:1}}
@keyframes fadeIn{0%{opacity:0;transform:scale(.98)}100%{opacity:1;transform:scale(1)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes marqueeScroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.tab-indicator{position:absolute;bottom:-2px;height:3px;background:var(--g600);border-radius:2px;transition:left .35s cubic-bezier(.16,1,.3,1),width .35s cubic-bezier(.16,1,.3,1)}
#nav{position:absolute;bottom:0;left:0;right:0;height:calc(var(--nav-h) + var(--safe-b));background:rgba(255,255,255,.85); saturate(180%);-webkit- saturate(180%);border-top:1px solid rgba(0,0,0,.06);display:flex;align-items:center;padding:0 8px;padding-bottom:var(--safe-b);z-index:100;transition:transform .3s cubic-bezier(.4,0,.2,1);box-shadow:0 -2px 20px rgba(0,0,0,.04)}
#nav.hide{transform:translateY(calc(100% + 60px))}
#miniplayer{position:fixed;bottom:calc(var(--nav-h) + var(--safe-b));left:50%;transform:translateX(-50%);width:100%;max-width:410px;display:none;background:rgba(255,255,255,.75); saturate(180%);-webkit- saturate(180%);border-radius:14px;border-top:1px solid rgba(0,0,0,.06);box-shadow:0 -4px 24px rgba(0,0,0,.1)}
#vminiplayer{position:fixed;bottom:calc(var(--nav-h) + var(--safe-b));left:50%;transform:translateX(-50%);width:100%;max-width:410px;display:none;background:rgba(255,255,255,.75); saturate(180%);-webkit- saturate(180%);border-radius:14px;border-top:1px solid rgba(0,0,0,.06);box-shadow:0 -4px 24px rgba(0,0,0,.1)}
.ni{flex:1;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;height:100%;transition:all .2s cubic-bezier(.4,0,.2,1)}
.ni:active{transform:scale(.85)}
.ni i{font-size:24px;color:var(--n400);transition:all .25s cubic-bezier(.4,0,.2,1)}
.ni.on i{color:var(--g700);font-size:25px}
.ni.on::after{content:'';position:absolute;bottom:10px;width:5px;height:5px;background:var(--g600);border-radius:50%}
.fab-spacer{width:68px;flex-shrink:0}
.fab{position:absolute;left:50%;bottom:calc(var(--safe-b) + var(--nav-h)/2);transform:translateX(-50%);width:54px;height:54px;border-radius:50%;background:linear-gradient(135deg,#1B5E20,#43A047);display:flex;align-items:center;justify-content:center;color:white;font-size:26px;cursor:pointer;box-shadow:0 4px 20px rgba(46,125,50,.45);z-index:102;transition:all .35s cubic-bezier(.68,-.55,.27,1.55)}
.fab:active{transform:translateX(-50%) scale(.88)}
.fab.open{transform:translateX(-50%) rotate(180deg);background:var(--n800);box-shadow:0 4px 20px rgba(0,0,0,.3)}
.fab-overlay{position:fixed;inset:0;background:rgba(0,0,0,.25);-webkit-z-index:99;opacity:0;pointer-events:none;transition:all .3s}
.fab-overlay.show{opacity:1;pointer-events:auto}
.fab-menu{position:absolute;left:50%;bottom:calc(var(--safe-b) + var(--nav-h) + 8px);transform:translateX(-50%);width:280px;height:140px;z-index:101;pointer-events:none;opacity:0;transition:all .2s}
.fab-menu.show{pointer-events:auto;opacity:1}
.fab-item{position:absolute;display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;opacity:0;transform:scale(.3);transition:all .4s cubic-bezier(.68,-.55,.27,1.55)}
.fab-item:nth-child(1){left:10px;bottom:20px}
.fab-item:nth-child(2){left:55px;bottom:80px}
.fab-item:nth-child(3){right:55px;bottom:80px}
.fab-item:nth-child(4){right:10px;bottom:20px}
.fab-menu.show .fab-item{opacity:1;transform:scale(1)}
.fab-menu.show .fab-item:nth-child(1){transition-delay:0s}
.fab-menu.show .fab-item:nth-child(2){transition-delay:.07s}
.fab-menu.show .fab-item:nth-child(3){transition-delay:.14s}
.fab-menu.show .fab-item:nth-child(4){transition-delay:.21s}
.fab-ic{width:50px;height:50px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;color:white;box-shadow:0 4px 15px rgba(0,0,0,.2);transition:transform .15s}
.fab-ic:active{transform:scale(.9)}
.fab-item span{font-size:10px;font-weight:700;color:var(--white);text-shadow:0 1px 4px rgba(0,0,0,.3)}
#splash{position:fixed;inset:0;background:var(--white);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;transition:opacity .6s ease,transform .6s ease}
#splash.go{opacity:0;transform:scale(1.05);pointer-events:none}
@keyframes bellBounce{0%,100%{transform:rotate(0)}10%{transform:rotate(12deg)}20%{transform:rotate(-10deg)}30%{transform:rotate(6deg)}40%{transform:rotate(0)}}
.sp-logo{display:flex;align-items:center;gap:14px;margin-bottom:48px}
.sp-logo svg{width:44px;height:44px}
.sp-text{font-size:26px;font-weight:800;color:var(--n900);letter-spacing:-.5px}
.sp-text b{color:var(--g600);font-weight:800}
.sp-bar{width:120px;height:3px;background:var(--n100);border-radius:2px;overflow:hidden}
.sp-bar i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--g400),var(--g700));border-radius:2px;animation:spLoad 1.6s ease forwards}
@keyframes spLoad{to{width:100%}}
.bh{display:flex;align-items:center;padding:12px 16px;background:var(--white);position:sticky;top:0;z-index:20;min-height:52px}
.bh-btn{width:36px;height:36px;border-radius:50%;border:none;background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--n800);margin-right:8px;transition:background .15s}
.bh-btn:active{background:var(--n100)}
.bh-btn svg{width:20px;height:20px}
.bh h2{font-size:16px;font-weight:700;color:var(--n900);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bh-line{position:absolute;bottom:0;left:0;right:0;height:1px;background:var(--n100)}
.sb{margin:0 20px 14px;position:relative}
.sb input{width:100%;height:46px;padding:0 16px 0 46px;border:1.5px solid var(--n200);border-radius:var(--r-xl);font:500 14px/1 'Plus Jakarta Sans',sans-serif;background:var(--white);color:var(--n900);outline:none;transition:border .2s,box-shadow .2s}
.sb input:focus{border-color:var(--g400);box-shadow:0 0 0 3px rgba(76,175,80,.12)}
.sb input::placeholder{color:var(--n400)}
.sb .si{position:absolute;left:15px;top:50%;transform:translateY(-50%);font-size:20px;color:var(--n400);pointer-events:none;width:auto;height:auto}
.sh{display:flex;justify-content:space-between;align-items:baseline;padding:20px 20px 10px}
.sh h3{font-size:15px;font-weight:800;color:var(--n800)}
.sh a{font-size:12px;font-weight:700;color:var(--g700);cursor:pointer}
.chip{display:inline-block;padding:6px 14px;border-radius:var(--r-full);font-size:12px;font-weight:600;border:1.5px solid var(--g300);color:var(--g800);background:var(--white);transition:all .15s;cursor:pointer}
.chip.on{background:var(--g700);color:var(--white);border-color:var(--g700)}
.li{display:flex;align-items:center;gap:14px;padding:14px 20px;cursor:pointer;transition:background .1s}
.li:active{background:var(--n50)}
.li+.li{border-top:1px solid var(--n100)}
.li .lt{width:60px;height:60px;border-radius:var(--r-md);flex-shrink:0;overflow:hidden}
.li .lf{flex:1;min-width:0}
.li .lf h4{font-size:14px;font-weight:700;color:var(--n800);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.li .lf p{font-size:12px;color:var(--n500);margin-top:2px}
.li .la{width:20px;height:20px;color:var(--n300);flex-shrink:0}
.badge-live{display:inline-flex;align-items:center;gap:5px;background:#DC2626;color:white;font-size:10px;font-weight:700;padding:4px 10px;border-radius:var(--r-full);letter-spacing:.4px}
.badge-live::before{content:'';width:6px;height:6px;background:white;border-radius:50%;animation:blink 1.2s ease infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.cs-wrap{position:relative;min-height:70vh}
.cs-ov{position:absolute;inset:0;background:rgba(255,255,255,.88);-webkit-display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:5}
.cs-badge{background:linear-gradient(135deg,var(--g800),var(--g500));color:white;padding:12px 32px;border-radius:var(--r-full);font-size:14px;font-weight:800;box-shadow:var(--s-lg);letter-spacing:.3px}
.cs-ov p{margin-top:10px;font-size:13px;color:var(--n500);font-weight:500}
.ip{display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.ip.nature{background:linear-gradient(160deg,#a8d8a8 0%,#6db56d 40%,#3d8b3d 70%,#2a6a2a 100%)}
.ip.warm{background:linear-gradient(135deg,#f9d976 0%,#f39f86 100%)}
.ip.cool{background:linear-gradient(135deg,#a1c4fd 0%,#c2e9fb 100%)}
.ip.earth{background:linear-gradient(160deg,#d4a574 0%,#8B7355 50%,#6b8f71 100%)}
.ip.sky{background:linear-gradient(180deg,#89CFF0 0%,#D4F1F9 60%,#E8F8E8 100%)}
.ip.sunset{background:linear-gradient(135deg,#ffecd2 0%,#fcb69f 100%)}
.ip.forest{background:linear-gradient(160deg,#1B5E20 0%,#388E3C 40%,#66BB6A 100%)}
.ip::after{content:'';position:absolute;inset:0;background:linear-gradient(0deg,rgba(0,0,0,.12) 0%,transparent 50%);pointer-events:none}
.hm-top{background:linear-gradient(135deg,var(--g800) 0%,var(--g600) 100%);padding:env(safe-area-inset-top,12px) 20px 20px;position:relative}
.hm-top::after{content:'';position:absolute;bottom:-20px;left:0;right:0;height:24px;background:var(--n50);border-radius:var(--r-2xl) var(--r-2xl) 0 0}
.hm-row{display:flex;align-items:center;gap:14px;padding-top:12px}
.hm-av{width:44px;height:44px;border-radius:50%;background:var(--g300);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:var(--g900);position:relative;flex-shrink:0}
.hm-av::after{content:'';position:absolute;bottom:1px;right:1px;width:10px;height:10px;background:#22C55E;border:2px solid var(--g800);border-radius:50%}
.hm-greet{flex:1}.hm-greet small{font-size:11px;color:var(--g200);font-weight:500}.hm-greet h2{font-size:17px;font-weight:800;color:var(--white);margin-top:1px}
.hm-acts{display:flex;gap:6px}
.hm-act{width:38px;height:38px;border-radius:50%;border:none;background:rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--g100);position:relative;transition:background .15s}
.hm-act:active{background:rgba(255,255,255,.25)}.hm-act svg{width:20px;height:20px}
.hm-dot{position:absolute;top:7px;right:7px;width:8px;height:8px;background:var(--red);border-radius:50%;border:2px solid var(--g700)}
.hm-search{margin:4px 20px 0;position:relative}
.hm-search input{width:100%;height:44px;padding:0 16px 0 44px;border:none;border-radius:var(--r-xl);font:500 13px/1 'Plus Jakarta Sans',sans-serif;background:rgba(255,255,255,.15);color:var(--white);outline:none;}
.hm-search input::placeholder{color:rgba(255,255,255,.55)}
.hm-search .si{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:18px;color:rgba(255,255,255,.5);width:auto;height:auto}
.hm-body{padding-top:8px;background:var(--n50)}
.qm{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;padding:12px 20px 8px}
.qm-i{display:flex;flex-direction:column;align-items:center;gap:7px;padding:12px 4px 10px;border-radius:var(--r-lg);cursor:pointer;transition:background .15s,transform .1s}
.qm-i:active{transform:scale(.95);background:var(--n100)}
.qm-ic{width:48px;height:48px;border-radius:var(--r-lg);display:flex;align-items:center;justify-content:center;overflow:visible}
.qm-ic svg{width:24px;height:24px}.qm-i span{font-size:11px;font-weight:700;color:var(--n700);text-align:center}
.pc-scroll{display:flex;gap:12px;padding:0 20px 4px;overflow-x:auto;-webkit-overflow-scrolling:touch}.pc-scroll::-webkit-scrollbar{display:none}
.pc-item{display:flex;flex-direction:column;align-items:center;gap:7px;flex-shrink:0;cursor:pointer}.pc-item:active .pc-img{transform:scale(.94)}
.pc-img{width:80px;height:80px;border-radius:var(--r-lg);overflow:hidden;border:2.5px solid var(--g400);padding:2px;background:var(--white);transition:transform .15s}
.pc-img>div{width:100%;height:100%;border-radius:var(--r-md)}
.pc-img img{border-radius:var(--r-md) !important}
.pc-item span{font-size:10px;font-weight:700;color:var(--n700);max-width:84px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:center}
.vc-scroll{display:flex;gap:12px;padding:0 20px 8px;overflow-x:auto;-webkit-overflow-scrolling:touch}.vc-scroll::-webkit-scrollbar{display:none}
.vc{width:192px;flex-shrink:0;border-radius:var(--r-lg);overflow:hidden;background:var(--white);box-shadow:var(--s-sm);cursor:pointer;transition:transform .15s}
.vc:active{transform:scale(.97)}
.vc-thumb{width:100%;height:108px;position:relative}.vc-thumb .dur{position:absolute;bottom:6px;right:6px;background:rgba(0,0,0,.7);color:white;font-size:10px;font-weight:600;padding:2px 6px;border-radius:4px}
.vc-body{padding:10px 12px 12px}.vc-body h4{font-size:13px;font-weight:700;color:var(--n800);line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}.vc-body small{font-size:11px;color:var(--n500);display:block;margin-top:4px}
.ac{margin:0 20px 16px;border-radius:var(--r-xl);overflow:hidden;background:var(--white);box-shadow:var(--s-md);cursor:pointer;transition:transform .15s}
.ac:active{transform:scale(.985)}
.ac-img{width:100%;height:172px;position:relative}
.ac-img::before{content:'';position:absolute;inset:0;background:linear-gradient(0deg,rgba(0,0,0,.5) 0%,transparent 60%);z-index:1}
.ac-tag{position:absolute;top:12px;left:12px;z-index:2;background:var(--g700);color:white;font-size:10px;font-weight:700;padding:4px 10px;border-radius:var(--r-full)}
.ac-body{padding:14px 16px 16px}.ac-body h4{font-size:15px;font-weight:800;color:var(--n900);line-height:1.35;margin-bottom:6px}.ac-body p{font-size:12px;color:var(--n500);line-height:1.6;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.pf-top{background:linear-gradient(135deg,var(--g50) 0%,#d5ecd5 100%);padding:24px 20px 28px}.pf-top h1{font-size:22px;font-weight:800;color:var(--n900)}
.pf-card{margin:-12px 20px 0;background:var(--white);border-radius:var(--r-xl);box-shadow:var(--s-lg);padding:20px;position:relative;z-index:2}
.pf-row{display:flex;align-items:center;gap:16px}
.pf-av{width:68px;height:68px;border-radius:var(--r-lg);overflow:hidden;flex-shrink:0;border:3px solid var(--g400)}
.pf-av>div{width:100%;height:100%}
.pf-nm h3{font-size:17px;font-weight:800;color:var(--n900)}.pf-nm p{font-size:13px;color:var(--g700);margin-top:2px;font-weight:500}
.pf-menu{margin:20px 20px 0}
.pm{display:flex;align-items:center;gap:14px;padding:16px 2px;border-bottom:1px solid var(--n100);cursor:pointer;transition:background .12s}
.pm:active{background:var(--n50);border-radius:var(--r-sm)}.pm:last-child{border-bottom:none}
.pm-ic{width:38px;height:38px;border-radius:var(--r-md);display:flex;align-items:center;justify-content:center}.pm-ic svg{width:18px;height:18px}
.pm span{flex:1;font-size:14px;font-weight:600;color:var(--n800)}.pm .chv{width:16px;height:16px;color:var(--n300)}
.pf-out{margin:28px 20px;text-align:center}
.pf-out button{padding:12px 56px;border-radius:var(--r-full);border:1.5px solid var(--n300);background:var(--white);font:700 14px/1 'Plus Jakarta Sans',sans-serif;color:var(--n700);cursor:pointer;transition:all .15s}
.pf-out button:active{background:var(--n100);transform:scale(.97)}
.pf-det{margin:20px;padding:16px 20px;background:var(--n50);border-radius:var(--r-lg)}
.pf-det h4{font-size:13px;font-weight:800;color:var(--n700);margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px}
.pd-r{display:flex;justify-content:space-between;padding:8px 0}.pd-r+.pd-r{border-top:1px solid var(--n200)}
.pd-r label{font-size:12px;color:var(--n500);font-weight:500}.pd-r span{font-size:13px;font-weight:700;color:var(--n800)}
.vl-hero{position:relative;padding:36px 20px 20px;overflow:hidden;background:url('assets/desa/hero-bg.jpg') center/cover no-repeat}
.vl-hero::before{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(15,60,20,.5) 0%,rgba(15,60,20,.35) 50%,rgba(15,60,20,.6) 100%);z-index:1}
.vl-hero::after{content:'';position:absolute;inset:0;z-index:0}
.vl-hero>*{position:relative;z-index:2}

pvids:[{t:'Gila Dangdut — Gitar Penyejuk Jiwa (Bag. 1)',c:'sunset',dur:'45:00',desc:'Episode pertama dari serial Gila Dangdut. Mengikuti perjalanan seorang pemuda desa yang menemukan kecintaannya pada musik dangdut lewat petikan gitar warisan sang ayah.',genre:'Drama Musikal',img:'assets/films/Gila-Dangdut---Episode-Gitar-Penyejuk-Jiwa-Bagian-1.jpeg'},
{t:'Gila Dangdut — Gitar Penyejuk Jiwa (Bag. 2)',c:'sunset',dur:'42:30',desc:'Kelanjutan kisah sang pemuda yang kini harus memilih antara mimpi bermusik dan tanggung jawab keluarga. Akankah suara gitarnya mampu menyejukkan jiwa yang gundah?',genre:'Drama Musikal',img:'assets/films/Gila-Dangdut---Episode-Gitar-Penyejuk-Jiwa-Bagian-2.jpeg'},
